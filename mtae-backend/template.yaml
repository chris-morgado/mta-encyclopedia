AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MTA Encyclopedia Backend

Parameters:
  UserPoolId:
    Type: String
    Default: us-east-1_WgVikn28P

Globals:
  Function:
    Timeout: 10
    Runtime: python3.13
    Architectures:
      - x86_64
    CodeUri: src/lambdas/
    Environment:
      Variables:
        TABLE_NAME: user_profiles

Resources:

  # API Gateway, w/ Cognito Authorizer
  MtaeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,PUT,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'

  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_4XX
      RestApiId: !Ref MtaeApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_5XX
      RestApiId: !Ref MtaeApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_profile.handler
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MtaeApi
            Path: /profile/{userId}
            Method: GET
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBReadPolicy:
            TableName: user_profiles

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update_profile.handler
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MtaeApi
            Path: /profile
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: user_profiles

  # Favorite Stops Lambdas
  GetFavoriteStopsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_favorite_stops.handler
      Events:
        GetFavorites:
          Type: Api
          Properties:
            RestApiId: !Ref MtaeApi
            Path: /profile/favorites
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: user_profiles

  UpdateFavoriteStopsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update_favorite_stops.handler
      Events:
        UpdateFavorites:
          Type: Api
          Properties:
            RestApiId: !Ref MtaeApi
            Path: /profile/favorites
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: user_profiles

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MtaeApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
